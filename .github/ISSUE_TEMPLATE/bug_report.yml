name: Bug report
description: Report a reproducible defect in LiAgent OS
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please do not include API keys, tokens, personal file paths, or other secrets.
  - type: input
    id: version
    attributes:
      label: Version
      description: Which LiAgent OS version are you using?
      placeholder: "v0.1.2"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Where did you hit the problem?
      options:
        - Web
        - CLI
        - Discord
        - API
        - Other
    validations:
      required: true
  - type: dropdown
    id: runtime_mode
    attributes:
      label: Runtime mode
      description: Which runtime mode or setup path were you using?
      options:
        - API bootstrap
        - local_private
        - hybrid_balanced
        - cloud_performance
        - Not sure
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the defect.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the smallest reliable reproduction.
      placeholder: |
        1. Start LiAgent OS with ...
        2. Open ...
        3. Send ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or add screenshots with secrets removed.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I removed secrets and personal data from this report.
          required: true
        - label: I checked the current public boundaries in docs/current-limitations.md.
          required: true
        - label: I included a minimal reproduction or a clear reason why I could not.
          required: true
