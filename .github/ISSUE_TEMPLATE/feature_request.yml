name: Feature request
description: Propose a product or runtime improvement for LiAgent OS
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this form for product gaps, new capabilities, or roadmap requests.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or operator problem is not solved well today?
      placeholder: The current flow makes it hard to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like LiAgent OS to do?
      placeholder: Add or change ...
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why this matters
      description: Why is this important for the product direction or user experience?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Local-model experience
        - Hybrid routing
        - Task execution
        - Heartbeat or autonomy
        - Safety or governance
        - UX or onboarding
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: If you have alternatives or tradeoffs in mind, add them here.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked docs/current-limitations.md so I am not reporting an already-stated boundary as a bug.
          required: true
        - label: I explained the user value, not just the implementation idea.
          required: true
